// aichizuki AutoExec | Counter-Strike 2

// Set temporary generic console output color to pink.
log_color "Console" "FF25FFFF"

// Displaying start message.
echo |                                                                                 |
echo |                                      aichizuki                                  |
echo |                                                                                 |
echo |                                                                                 |
echo |                                   [ Information ]                               |
echo |                                    Version : 1.0                                |
echo |                                                                                 |
echo |                                  GitHub Repository:                             |
echo |                       github.com/aichizuki/aichizuki-autoexec/                  |
echo |                                                                                 | 
echo |             BUY                 COMMUNI                 ACTION                  |
echo |                                                                                 |
echo |     +grenade   =mouse5      +say-Hi      =f1       +quick-switch =c             |
echo |     +vesthelm  =f13         +afk-move    =f4       +radar        =x             |
echo |     +vest      =f14         +clutch-mode =f5       +drop-bomb    =z             |
echo |     +defuser   =f15         +quit        =f11      +crosshair    =4             |
echo |     +rifles    =f16         +disconnect  =f12                                   |
echo |     +awp       =f17                                                             |        
echo |     +mid-tier  =f18                                                             |
echo |                                                                                 |
echo |                                                                                 |
echo |                                                                                 |
echo |                                                                                 |
echo |                                                                                 |
echo |                                                                                 |
echo |                                                                                 |
echo |                                                                                 |
echo |                                                                                 |
echo |                                                                                 |



// Executing each configuration file.
exec "aichizuki\audio.cfg"
exec "aichizuki\bind.cfg"
exec "aichizuki\crosshair.cfg"
exec "aichizuki\hud.cfg"
exec "aichizuki\mouse.cfg"
exec "aichizuki\network.cfg"
exec "aichizuki\script.cfg"
exec "aichizuki\video.cfg"

// Reverting the changed color.
log_color "Console" "FF25FFFF"

// Write all the settings into config.cfg file, the main configuration file of the game.
host_writeconfig

// Play a snowball custom sound when the entire process is done.
play "player/winter/snowball_throw_02.wav"